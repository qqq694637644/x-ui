{{define "form/streamKCP"}}
<a-form layout="inline">
    <a-alert type="warning" show-icon style="margin-bottom: 16px;"
             message="mKCP 参数会生成 Xray 26 配置"
             description="这里只生成 kcpSettings 和 finalmask.udp；不会写入旧版 kcpSettings.header/seed。"></a-alert>
    <a-form-item label="FinalMask UDP header">
        <a-select v-model="inbound.stream.kcp.finalMaskType" style="width: 240px;">
            <a-select-option value="none">none</a-select-option>
            <a-select-option value="header-srtp">header-srtp</a-select-option>
            <a-select-option value="header-utp">header-utp</a-select-option>
            <a-select-option value="header-wechat">header-wechat</a-select-option>
            <a-select-option value="header-dtls">header-dtls</a-select-option>
            <a-select-option value="header-wireguard">header-wireguard</a-select-option>
        </a-select>
    </a-form-item>
    <a-form-item label="mtu">
        <a-input type="number" v-model.number="inbound.stream.kcp.mtu"></a-input>
    </a-form-item>
    <a-form-item label="tti (ms)">
        <a-input type="number" v-model.number="inbound.stream.kcp.tti"></a-input>
    </a-form-item>
    <a-form-item label="uplink capacity (MB/S)">
        <a-input type="number" v-model.number="inbound.stream.kcp.upCap"></a-input>
    </a-form-item>
    <a-form-item label="downlink capacity (MB/S)">
        <a-input type="number" v-model.number="inbound.stream.kcp.downCap"></a-input>
    </a-form-item>
    <a-form-item label="congestion">
        <a-switch v-model="inbound.stream.kcp.congestion"></a-switch>
    </a-form-item>
    <a-form-item label="read buffer size (MB)">
        <a-input type="number" v-model.number="inbound.stream.kcp.readBuffer"></a-input>
    </a-form-item>
    <a-form-item label="write buffer size (MB)">
        <a-input type="number" v-model.number="inbound.stream.kcp.writeBuffer"></a-input>
    </a-form-item>
</a-form>
{{end}}
