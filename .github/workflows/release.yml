name: Release Linux AMD64

on:
  push:
    tags:
      - '0.*'
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create or update, for example v0.3.2'
        required: true
        type: string
      draft:
        description: 'Create or update the release as a draft'
        required: false
        default: false
        type: boolean
      prerelease:
        description: 'Mark the release as a prerelease'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release-linux-amd64:
    name: Build and publish Linux amd64
    runs-on: ubuntu-latest
    env:
      ASSET_NAME: x-ui-linux-amd64.tar.gz
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20.x'
          cache: true

      - name: Build Linux amd64 package
        run: |
          set -euo pipefail

          rm -rf dist "$ASSET_NAME"
          mkdir -p dist/x-ui/bin

          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o dist/x-ui/x-ui main.go

          cp x-ui.service dist/x-ui/x-ui.service
          cp x-ui.sh dist/x-ui/x-ui.sh

          curl -fL -o /tmp/Xray-linux-64.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q /tmp/Xray-linux-64.zip -d /tmp/xray-linux-amd64
          install -m 0755 /tmp/xray-linux-amd64/xray dist/x-ui/bin/xray-linux-amd64

          curl -fL -o dist/x-ui/bin/geoip.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat
          curl -fL -o dist/x-ui/bin/geosite.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat

          chmod +x dist/x-ui/x-ui dist/x-ui/x-ui.sh dist/x-ui/bin/xray-linux-amd64
          tar -C dist -zcvf "$ASSET_NAME" x-ui

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: ${{ env.RELEASE_TAG }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          files: ${{ env.ASSET_NAME }}
          fail_on_unmatched_files: true
